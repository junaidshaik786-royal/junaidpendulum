<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junaid's Pendulum Wave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .header {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        
        .header h1 {
            color: #00f0ff;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
        }
        
        .attribution {
            position: fixed;
            top: 15px;
            left: 15px;
            color: #ffd700;
            font-size: 0.7rem;
            z-index: 100;
            border: 1px solid #ffd700;
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,10,20,0.9);
            border: 1px solid #00f0ff;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 100;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .control-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .control-item label {
            color: #7a9bb5;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .control-item span {
            color: #00f0ff;
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        input[type="range"] {
            width: 80px;
            cursor: pointer;
        }
        
        button {
            background: transparent;
            border: 2px solid #00f0ff;
            color: #00f0ff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00f0ff;
            color: #000;
        }
        
        button.playing {
            border-color: #ff00ff;
            color: #ff00ff;
        }
        
        button.playing:hover {
            background: #ff00ff;
            color: #000;
        }
        
        .stats {
            position: fixed;
            top: 80px;
            right: 15px;
            background: rgba(0,10,20,0.9);
            border: 1px solid #00f0ff;
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 100;
        }
        
        .stats div {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            padding: 3px 0;
        }
        
        .stats label {
            color: #7a9bb5;
            font-size: 0.6rem;
        }
        
        .stats span {
            color: #00f0ff;
            font-size: 0.7rem;
            font-weight: 700;
        }
        
        .sync-bar {
            width: 100%;
            height: 5px;
            background: #222;
            margin-top: 8px;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .sync-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00f0ff, #00ff88);
            width: 0%;
            transition: width 0.1s;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    
    <div class="header">
        <h1>PENDULUM WAVE</h1>
    </div>
    
    <div class="attribution">Created by Junaid Shaik</div>
    
    <div class="stats">
        <div><label>Time:</label><span id="timeDisplay">0.0s</span></div>
        <div><label>Bounces:</label><span id="bounceDisplay">0</span></div>
        <div><label>Sync:</label><span id="syncDisplay">0%</span></div>
        <div class="sync-bar"><div class="sync-bar-fill" id="syncBar"></div></div>
    </div>
    
    <div class="controls">
        <div class="control-item">
            <label>Count</label>
            <input type="range" id="countSlider" min="10" max="40" value="25">
            <span id="countDisplay">25</span>
        </div>
        <div class="control-item">
            <label>Speed</label>
            <input type="range" id="speedSlider" min="1" max="10" value="4">
            <span id="speedDisplay">4x</span>
        </div>
        <div class="control-item">
            <label>Volume</label>
            <input type="range" id="volSlider" min="0" max="1" step="0.1" value="0.3">
            <span id="volDisplay">30%</span>
        </div>
        <button id="playBtn">▶ PLAY</button>
        <button id="resetBtn">↺ RESET</button>
    </div>

    <script>
        // CANVAS SETUP
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // UI ELEMENTS
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const countSlider = document.getElementById('countSlider');
        const speedSlider = document.getElementById('speedSlider');
        const volSlider = document.getElementById('volSlider');
        
        const countDisplay = document.getElementById('countDisplay');
        const speedDisplay = document.getElementById('speedDisplay');
        const volDisplay = document.getElementById('volDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const bounceDisplay = document.getElementById('bounceDisplay');
        const syncDisplay = document.getElementById('syncDisplay');
        const syncBar = document.getElementById('syncBar');
        
        // STATE
        let pendulums = [];
        let isPlaying = false;
        let time = 0;
        let bounceCount = 0;
        let settings = { count: 25, speed: 4, volume: 0.3 };
        
        // COLORS
        const colors = ['#00f0ff','#00d4ff','#00b8ff','#009cff','#0080ff','#ff00ff','#ff00e0','#ff00c0','#ff00a0','#ff0080','#00ff88','#00ff66','#88ff00','#ccff00','#ffdd00','#ff8800','#ff4400','#ff0044','#00ffee','#00ddff','#66ffff'];
        
        // AUDIO
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSound(freq, vol) {
            if (!audioCtx || vol === 0) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.frequency.value = freq;
            osc.type = 'sine';
            
            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(vol * settings.volume * 0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now);
            osc.stop(now + 0.3);
        }
        
        // RESIZE
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createPendulums();
        }
        
        // CREATE PENDULUMS
        function createPendulums() {
            pendulums = [];
            const count = settings.count;
            
            for (let i = 0; i < count; i++) {
                const x = (canvas.width / (count + 1)) * (i + 1);
                const y = 60;
                const len = ((canvas.height - 120) / count) * (i + 1);
                const freq = 1 + (i * 0.003);
                const noteFreq = 200 + (i * 20);
                
                pendulums.push({
                    x: x,
                    y: y,
                    len: len,
                    freq: freq,
                    note: noteFreq,
                    color: colors[i % colors.length],
                    angle: 0,
                    prevAngle: 0
                });
            }
        }
        
        // UPDATE
        function update() {
            // Draw background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (isPlaying) {
                time += settings.speed * 0.05;
            }
            
            bounceCount = 0;
            let syncedCount = 0;
            
            pendulums.forEach((p, i) => {
                p.prevAngle = p.angle;
                p.angle = 0.5 * Math.sin(time * p.freq);
                
                // Check for crossing center
                const crossed = (p.prevAngle < 0 && p.angle >= 0) || (p.prevAngle > 0 && p.angle <= 0);
                if (crossed && isPlaying && time > 0.5) {
                    bounceCount++;
                    if (i % 2 === 0) {
                        playSound(p.note, 0.5);
                    }
                }
                
                if (Math.abs(p.angle) < 0.05) syncedCount++;
                
                // Calculate bob position
                const bobX = p.x + p.len * Math.sin(p.angle);
                const bobY = p.y + p.len * Math.cos(p.angle);
                
                // Draw string
                ctx.beginPath();
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(bobX, bobY);
                ctx.stroke();
                
                // Draw bob
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.arc(bobX, bobY, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw pivot
                ctx.beginPath();
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.shadowBlur = 0;
            
            // Update stats
            timeDisplay.textContent = (time / 10).toFixed(1) + 's';
            bounceDisplay.textContent = bounceCount;
            
            const syncPercent = Math.round((syncedCount / pendulums.length) * 100);
            syncDisplay.textContent = syncPercent + '%';
            syncBar.style.width = syncPercent + '%';
            
            requestAnimationFrame(update);
        }
        
        // EVENT LISTENERS
        playBtn.addEventListener('click', () => {
            initAudio();
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                playBtn.textContent = '⏸ PAUSE';
                playBtn.classList.add('playing');
                playSound(440, 0.3);
            } else {
                playBtn.textContent = '▶ PLAY';
                playBtn.classList.remove('playing');
            }
        });
        
        resetBtn.addEventListener('click', () => {
            time = 0;
            createPendulums();
            if (isPlaying) playSound(440, 0.3);
        });
        
        countSlider.addEventListener('input', (e) => {
            settings.count = parseInt(e.target.value);
            countDisplay.textContent = settings.count;
            createPendulums();
        });
        
        speedSlider.addEventListener('input', (e) => {
            settings.speed = parseInt(e.target.value);
            speedDisplay.textContent = settings.speed + 'x';
        });
        
        volSlider.addEventListener('input', (e) => {
            settings.volume = parseFloat(e.target.value);
            volDisplay.textContent = Math.round(settings.volume * 100) + '%';
        });
        
        window.addEventListener('resize', resize);
        
        // START
        resize();
        update();
    </script>
</body>
</html>
